<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" font-family="'Playfair Display', Georgia, serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2E3D5"/>
      <stop offset="1" stop-color="#C98B9B"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1500" fill="url(#bg)"/>
  <!-- top accent bar -->
  <rect x="0" y="0" width="1000" height="14" fill="#8B4F5E"/>
  <!-- brand wordmark -->
  <text x="80" y="150" font-family="'Playfair Display', Georgia, serif" font-size="64" font-weight="700" fill="#4A3528" letter-spacing="2">Eira</text>
  <text x="82" y="190" font-family="'Raleway', system-ui, sans-serif" font-size="22" font-weight="500" fill="#8B4F5E" letter-spacing="6">BEAUTY · FASHION · SELF-CARE</text>
  <!-- decorative divider -->
  <line x1="80" y1="240" x2="220" y2="240" stroke="#8B4F5E" stroke-width="3"/>
  <!-- hook text (wrapped manually) -->
  <g font-family="'Playfair Display', Georgia, serif" font-weight="700" fill="#4A3528">
    <text x="80" y="420" font-size="92">Self-Care That Actually</text>
    <text x="80" y="530" font-size="92">Sticks</text>
  </g>
  <!-- sub line -->
  <text x="80" y="700" font-family="'Raleway', system-ui, sans-serif" font-size="30" font-weight="500" fill="#8B4F5E">4 timed blocks · 5 props</text>
  <!-- bottom CTA -->
  <rect x="0" y="1430" width="1000" height="70" fill="#4A3528"/>
  <text x="80" y="1475" font-family="'Raleway', system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="3">READ ON EIRA</text>
  <text x="920" y="1475" text-anchor="end" font-family="'Raleway', system-ui, sans-serif" font-size="28" font-weight="500" fill="#E8C4CE" letter-spacing="2">eira.example</text>
</svg>
